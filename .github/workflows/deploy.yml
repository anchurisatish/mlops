name: Deploy anc Model Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allows manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install databricks-cli requests pyyaml

      - name: Configure Databricks CLI
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "Configuring Databricks CLI..."
          mkdir -p ~/.databrickscfg
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = $DATABRICKS_HOST" >> ~/.databrickscfg
          echo "token = $DATABRICKS_TOKEN" >> ~/.databrickscfg
          echo "✅ Databricks CLI configured"

      - name: Validate configuration files
        run: |
          echo "📋 Validating YAML files..."
          python -c "import yaml; yaml.safe_load(open('src/anc_model/training_job.yaml'))"
          python -c "import yaml; yaml.safe_load(open('src/anc_model/model_registry.yaml'))"
          python -c "import yaml; yaml.safe_load(open('src/anc_model/endpoint.yaml'))"
          echo "✅ All configuration files are valid"

      - name: Display job configuration
        run: |
          echo "📦 Databricks Job Configuration:"
          cat src/anc_model/training_job.yaml
          echo ""
          echo "📦 Model Registry Configuration:"
          cat src/anc_model/model_registry.yaml
          echo ""
          echo "📦 Endpoint Configuration:"
          cat src/anc_model/endpoint.yaml

      - name: Deployment summary
        run: |
          echo "🎉 Deployment workflow completed!"
          echo "✅ Configuration files validated"
          echo "✅ Databricks CLI configured"
          echo ""
          echo "📍 Next steps:"
          echo "   1. In real setup, this would create Databricks job"
          echo "   2. Would register model in MLflow Registry"
          echo "   3. Would create serving endpoint"
          echo ""
          echo "For practice, we're simulating the workflow!"
